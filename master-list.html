<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master List - Inventory System</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f4f7fb;
      padding:20px;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    h1{
      margin-bottom:15px;
      color:#1e3a8a;
    }

    .section{
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:20px;
    }

    input{
      padding:8px;
      margin:5px;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      padding:8px 12px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .add{background:#1e3a8a;color:white;}
    .delete{background:#dc2626;color:white;}

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th,td{
      border:1px solid #ccc;
      padding:8px;
      font-size:13px;
    }

    th{
      background:#a9c0d7;
      color:#c00000;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>MASTER LIST</h1>

  <!-- ADD ITEM -->
  <div class="section">
    <h3>Add Item</h3>

    <input id="name" placeholder="Item Name">
    <input id="uom" placeholder="UOM">

    <button class="add" onclick="addItem()">Add</button>
    <button class="delete" onclick="clearAll()">Clear All</button>
  </div>

  <!-- TABLE -->
  <div class="section">
    <h3>Items</h3>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Item Name</th>
          <th>UOM</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>

// DEFAULT ITEMS (YOUR DATA)
const defaultItems = [
  {id:1, name:"BAR, FLAT, ALUMINUM 3/16 X 1 1/2 X 8", uom:"PIECES"},
  {id:2, name:"ADHESIVE, TILE, REGULAR, 25KG/BAG (ABC)", uom:"BAGS"},
  {id:3, name:"ATTACK DRIVER #AN-112A, KOKEN (USED)", uom:"PIECES"},
  {id:4, name:"BEARING, KM14 SWEDEN, SKF", uom:"PIECES"},
  {id:5, name:"BREAKER, ELECTRONIC TRIP UNIT", uom:"PIECES"},
  {id:6, name:"BUSHING, PLASTIC", uom:"PIECES"},
  {id:7, name:"DISC, CUTTING 16\" PREMIUM", uom:"PIECES"},
  {id:8, name:"GUTTER, WIRE (TRIANGULAR)", uom:"PIECES"},
  {id:9, name:"MODULE, IDNET SIMPLEX", uom:"PIECES"},
  {id:10, name:"MOTOR 15KW SIEMENS", uom:"UNITS"},
  {id:11, name:"NUTS, STAINLESS", uom:"PIECES"},
  {id:12, name:"PRESSURE GAUGE WIKA", uom:"PIECES"},
  {id:13, name:"THERMOSTAT CONTROL", uom:"PIECES"},
  {id:14, name:"GRANITE TILES", uom:"PIECES"},
  {id:15, name:"ABRASIVE PAPER", uom:"PIECES"},
  {id:16, name:"ACOUSTIC CEILING TILES", uom:"PIECES"},
  {id:17, name:"ACRYLIC PAINT BOYSEN", uom:"CANS"},
  {id:18, name:"ACTUATOR MOTOR", uom:"UNITS"},
  {id:19, name:"ADAPTOR POWER SUPPLY", uom:"PIECES"},
  {id:20, name:"AIR CONDITIONER SPLIT TYPE", uom:"UNITS"},
  {id:21, name:"ALARM FIRE SIMPLEX", uom:"PIECES"},
  {id:22, name:"ALUMINUM ANGLE", uom:"PIECES"},
  {id:23, name:"ANGLE VALVE", uom:"PIECES"},
  {id:24, name:"BATTERY SEALED LEAD ACID", uom:"PIECES"},
  {id:25, name:"BALL VALVE KITZ", uom:"PIECES"},
  {id:26, name:"BALLAST ELECTRONIC", uom:"PIECES"},
  {id:27, name:"BEARING SKF", uom:"PIECES"},
  {id:28, name:"V BELT", uom:"PIECES"},
  {id:29, name:"BIDET AMERICAN STANDARD", uom:"PIECES"},
  {id:30, name:"BOLT AND NUTS", uom:"PIECES"},
  {id:31, name:"BREAKER CIRCUIT", uom:"PIECES"},
  {id:32, name:"BULB LED", uom:"PIECES"},
  {id:33, name:"CABLE DATA", uom:"PACKS"},
  {id:34, name:"CAMERA CCTV", uom:"UNITS"},
  {id:35, name:"CAPACITOR", uom:"PIECES"},
  {id:36, name:"CASTER WHEELS", uom:"PIECES"},
  {id:37, name:"CEMENT PORTLAND", uom:"BAGS"},
  {id:38, name:"CHAIN BLOCK", uom:"PIECES"},
  {id:39, name:"CHLORINE TABLET", uom:"PIECES"},
  {id:40, name:"CIRCUIT BREAKER SIEMENS", uom:"PIECES"}
];

// LOAD OR INIT
let masterItems = JSON.parse(localStorage.getItem("masterItems"));

if(!masterItems || masterItems.length === 0){
  masterItems = defaultItems;
  localStorage.setItem("masterItems", JSON.stringify(masterItems));
}

function save(){
  localStorage.setItem("masterItems", JSON.stringify(masterItems));
}

function addItem(){
  const item = {
    id: Date.now(),
    name: name.value.trim(),
    uom: uom.value.trim()
  };

  if(!item.name || !item.uom){
    alert("Fill required fields");
    return;
  }

  masterItems.push(item);
  save();
  render();

  name.value="";
  uom.value="";
}

function render(){
  tableBody.innerHTML="";

  masterItems.forEach(item=>{
    tableBody.innerHTML+=`
    <tr>
      <td>${item.id}</td>
      <td>${item.name}</td>
      <td>${item.uom}</td>
      <td>
        <button onclick="deleteItem(${item.id})">Delete</button>
      </td>
    </tr>`;
  });
}

function deleteItem(id){
  if(confirm("Delete item?")){
    masterItems = masterItems.filter(i=>i.id !== id);
    save();
    render();
  }
}

function clearAll(){
  if(confirm("Reset to default items?")){
    masterItems = defaultItems;
    save();
    render();
  }
}

render();

</script>

</body>
</html>
