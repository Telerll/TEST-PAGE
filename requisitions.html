<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requisitions</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f4f7fb;
  padding:20px;
  color:#0f172a;
}

.container{
  max-width:1200px;
  margin:auto;
}

.top-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:16px;
}

.top-nav a{
  display:inline-block;
  text-decoration:none;
  background:#e5e7eb;
  color:#111827;
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
  font-size:14px;
}

.top-nav a:hover{
  background:#dbeafe;
  color:#1e3a8a;
}

.page-title{
  background:#0f172a;
  color:white;
  padding:18px;
  border-radius:14px;
  margin-bottom:16px;
}

.page-title h2{
  margin:0 0 4px;
}

.page-title p{
  margin:0;
  font-size:13px;
  color:#cbd5e1;
}

.section{
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:16px;
  box-shadow:0 4px 12px rgba(15,23,42,.06);
}

label{
  display:block;
  font-size:13px;
  font-weight:bold;
  color:#475569;
  margin-top:10px;
}

select,
input{
  padding:10px;
  margin-top:6px;
  width:100%;
  border:1px solid #cbd5e1;
  border-radius:8px;
  font-size:14px;
}

button{
  padding:10px 14px;
  margin-top:14px;
  background:#1e3a8a;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#172554;
}

.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
  min-width:600px;
}

th,td{
  border:1px solid #cbd5e1;
  padding:10px;
  text-align:center;
  font-size:14px;
}

th{
  background:#e2e8f0;
  color:#0f172a;
}

tbody tr:nth-child(even){
  background:#f8fafc;
}
</style>

</head>
<body>

<div class="container">

  <div class="top-nav">
    <a href="./index.html">Home</a>
    <a href="./master-list.html">Master List</a>
  </div>

  <div class="page-title">
    <h2>Requisitions (PR)</h2>
    <p>Prepare and monitor purchase requisition requests based on inventory requirements.</p>
  </div>

  <div class="section">

    <label>Select Item</label>
    <select id="itemSelect"></select>

    <label>Qty Requested</label>
    <input type="number" id="qty">

    <label>Requested By</label>
    <input type="text" id="requestBy">

    <button onclick="addPR()">Add Request</button>

  </div>

  <div class="section">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Requested By</th>
          </tr>
        </thead>
        <tbody id="prTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let prData = JSON.parse(localStorage.getItem("prData")) || [];

function loadItems(){
  let items = JSON.parse(localStorage.getItem("masterItems")) || [];
  let select = document.getElementById("itemSelect");

  select.innerHTML = '<option value="">Select</option>';

  items.forEach(i=>{
    select.innerHTML += `<option value="${i.id}">${i.name}</option>`;
  });
}

function addPR(){
  let items = JSON.parse(localStorage.getItem("masterItems")) || [];

  let id = Number(document.getElementById("itemSelect").value);
  let qty = Number(document.getElementById("qty").value);
  let by = document.getElementById("requestBy").value.trim();

  let item = items.find(i=>i.id===id);

  if(!item || !qty || !by){
    alert("Complete fields");
    return;
  }

  prData.push({
    item: item.name,
    qty,
    by
  });

  localStorage.setItem("prData",JSON.stringify(prData));

  document.getElementById("itemSelect").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("requestBy").value = "";

  renderPR();
}

function renderPR(){
  let tbody = document.getElementById("prTable");
  tbody.innerHTML="";

  prData.forEach(r=>{
    tbody.innerHTML += `
      <tr>
        <td>${r.item}</td>
        <td>${r.qty}</td>
        <td>${r.by}</td>
      </tr>
    `;
  });
}

loadItems();
renderPR();
</script>

</body>
</html>
