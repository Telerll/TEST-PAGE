<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory Management System</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue-main: #1e3a8a;
      --blue-dark: #172554;
      --blue-light: #3b82f6;
      --card: rgba(255,255,255,0.1);
      --card-hover: rgba(255,255,255,0.2);
      --text: #ffffff;
      --muted: #c7d2fe;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, var(--blue-dark), var(--blue-main));
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header .office {
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .header .dept {
      font-size: 18px;
      font-weight: bold;
      margin: 6px 0;
    }

    .header .system {
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 35px 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .card:hover {
      background: var(--card-hover);
      transform: translateY(-5px);
    }

    .icon {
      font-size: 45px;
      margin-bottom: 12px;
    }

    .card h3 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: var(--muted);
    }

    /* FOOTER */
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    /* MOBILE */
    @media(max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .header .system {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <div class="office">PROPERTY MANAGEMENT OFFICE</div>
      <div class="dept">STOCK CONTROL DEPARTMENT</div>
      <div class="system">INVENTORY MANAGEMENT SYSTEM</div>
    </div>

    <!-- CARDS -->
    <div class="grid">

      <div class="card" onclick="go('deliveries.html')">
        <div class="icon">📦</div>
        <h3>Deliveries</h3>
        <p>MRR / RMS Receiving</p>
      </div>

      <div class="card" onclick="go('issuance.html')">
        <div class="icon">📤</div>
        <h3>Issuance</h3>
        <p>MIS / AIF Transactions</p>
      </div>

      <div class="card" onclick="go('master-list.html')">
        <div class="icon">📋</div>
        <h3>Master List</h3>
        <p>Inventory Records</p>
      </div>

      <div class="card" onclick="go('pr-monitoring.html')">
        <div class="icon">🧾</div>
        <h3>Purchase Requisition</h3>
        <p>Reorder & PR Monitoring</p>
      </div>

    </div>

    <div class="footer">
      Inventory System © 2026
    </div>

  </div>

  <script>
    function go(page) {
      window.location.href = page;
    }
  </script>

</body>
</html>
