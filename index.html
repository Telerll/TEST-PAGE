<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPRX Financial Tracking System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  background:radial-gradient(circle at top,#0c2340,#071a33,#040712);
  color:#fff;
  padding:12px;
}

/* ================= HEADER ================= */
.header{
  background:
    radial-gradient(circle at 22% 50%, rgba(255,170,0,.35), transparent 35%),
    linear-gradient(135deg,#030712,#07111f,#0b1f3a);
    
  padding:16px 10px;
  border-radius:18px;

  min-height:200px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;

  position:relative;
  overflow:hidden;

  border:1px solid rgba(255,179,71,.25);
  box-shadow:0 15px 40px rgba(0,0,0,.5);
}

/* SHINE */
.header::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-80%;
  width:60%;
  height:200%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.3),transparent);
  transform:rotate(25deg);
  animation:shine 4s ease-in-out infinite;
}

/* LOGO */
.main-logo{
  max-width:170px;
  width:100%;
  margin-bottom:8px;
  position:relative;
  z-index:5;

  filter:
    drop-shadow(0 10px 25px rgba(0,0,0,.6))
    drop-shadow(0 0 18px rgba(255,170,0,.4));

  animation:pulse 3s ease-in-out infinite;
}

/* TEXT FIXED */
.system-title{
  display:block;
  position:relative;
  z-index:5;

  margin-top:8px;

  color:#ffffff;
  font-size:13px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;

  text-shadow:
    0 0 8px rgba(255,255,255,.9),
    0 0 18px rgba(255,179,71,.5);
}

/* ================= KPI ================= */
.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:12px;
}

.card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  padding:12px;
  border-radius:14px;
  text-align:center;
}

.income{border-left:4px solid #00ff9d}
.expense{border-left:4px solid #ff4d4d}
.net{border-left:4px solid #ffb300}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.module{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  padding:12px;
  border-radius:14px;
}

/* INPUT */
input,select{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:#0f2a52;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff9800,#ffb347);
  color:#111;
  font-weight:bold;
}

/* ================= REPORT ================= */
.report-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.report-box,.chart{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  padding:12px;
  border-radius:14px;
}

.item{
  background:rgba(255,255,255,.06);
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  font-size:13px;
}

.chart{margin-top:12px}

/* ================= ANIMATION ================= */
@keyframes shine{
  0%{left:-80%;opacity:0}
  30%{opacity:1}
  100%{left:130%;opacity:0}
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.05)}
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .grid,.kpi,.report-grid{
    grid-template-columns:1fr;
  }

  .header{
    min-height:180px;
  }

  .main-logo{
    max-width:140px;
  }

  .system-title{
    font-size:11px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="main-logo">
  <div class="system-title">FINANCIAL TRACKING SYSTEM</div>
</div>

<!-- KPI -->
<div class="kpi">
  <div class="card income">INCOME<br><b id="incomeTotal">₱0</b></div>
  <div class="card expense">EXPENSE<br><b id="expenseTotal">₱0</b></div>
  <div class="card net">NET<br><b id="netTotal">₱0</b></div>
  <div class="card">ENTRIES<br><b id="entryTotal">0</b></div>
</div>

<!-- INPUT -->
<div class="grid">

<div class="module">
<h3>INCOME</h3>

<select id="incomeType">
<option selected disabled>Select Income</option>
<option>Corporate Event</option>
<option>Wedding</option>
<option>Birthday</option>
<option>LED Wall & Visual Display</option>
<option>Stage & Production</option>
<option>Full Event Services</option>
</select>

<input id="incomeEvent" placeholder="Event / Client">
<input id="incomeAmount" type="number" placeholder="Amount">
<input id="incomeDate" type="date">

<button onclick="addIncome()">ADD INCOME</button>
</div>

<div class="module">
<h3>EXPENSE</h3>

<select id="expenseType">
<option selected disabled>Select Expense</option>
<option>Fuel</option>
<option>Salary</option>
<option>Repair</option>
<option>Office Supplies</option>
<option>Bills</option>
</select>

<input id="expenseNotes" placeholder="Notes">
<input id="expenseAmount" type="number" placeholder="Amount">
<input id="expenseDate" type="date">

<button onclick="addExpense()">ADD EXPENSE</button>
</div>

</div>

<div class="report-grid">
<div class="report-box"><h3>INCOME</h3><div id="incomeReport"></div></div>
<div class="report-box"><h3>EXPENSE</h3><div id="expenseReport"></div></div>
</div>

<div class="chart">
<canvas id="chartCanvas"></canvas>
</div>

<script>
let data = JSON.parse(localStorage.getItem("pprxData")) || [];
let income = 0, expense = 0, chart;

function save(){localStorage.setItem("pprxData", JSON.stringify(data));}

function addIncome(){
if(!incomeAmount.value)return;
data.push({type:"Income",category:incomeType.value,event:incomeEvent.value,amount:+incomeAmount.value});
reset();save();update();
}

function addExpense(){
if(!expenseAmount.value)return;
data.push({type:"Expense",category:expenseType.value,event:expenseNotes.value,amount:+expenseAmount.value});
reset();save();update();
}

function reset(){document.querySelectorAll("input").forEach(i=>i.value="");}

function update(){
income=0;expense=0;
incomeReport.innerHTML="";expenseReport.innerHTML="";

data.forEach(d=>{
if(d.type==="Income"){
income+=d.amount;
incomeReport.innerHTML+=`<div class="item">${d.category}<br>₱${d.amount}</div>`;
}
if(d.type==="Expense"){
expense+=d.amount;
expenseReport.innerHTML+=`<div class="item">${d.category}<br>₱${d.amount}</div>`;
}
});

incomeTotal.innerText="₱"+income;
expenseTotal.innerText="₱"+expense;
netTotal.innerText="₱"+(income-expense);
entryTotal.innerText=data.length;

drawChart();
}

function drawChart(){
if(chart) chart.destroy();
chart=new Chart(chartCanvas,{
type:"doughnut",
data:{labels:["Income","Expense"],datasets:[{data:[income,expense],backgroundColor:["#00ff9d","#ff4d4d"]}]}
});
}

update();
</script>

</body>
</html>
