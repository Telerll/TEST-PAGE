<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Master List - Inventory Management System</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

    :root{
      --blue-main:#1e3a8a;
      --blue-dark:#172554;
      --bg:#f4f7fb;
      --white:#ffffff;
      --line:#cbd5e1;
      --muted:#64748b;
      --head-bg:#a9c0d7;
      --head-text:#c00000;
      --green-dark:#2f8f2f;
      --green-mid:#8bc34a;
      --green-light:#00c853;
      --danger:#dc2626;
    }

    body{background:var(--bg);padding:20px;color:#1f2937}
    .container{max-width:2200px;margin:auto}

    .topbar{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:20px;flex-wrap:wrap;gap:12px;
    }

    .title small{
      display:block;font-size:12px;color:var(--muted);
      font-weight:bold;letter-spacing:1px;
    }

    .title h1{
      margin-top:4px;font-size:28px;color:var(--blue-dark);
    }

    .nav a{
      display:inline-block;text-decoration:none;background:#e5e7eb;
      color:#111827;padding:10px 14px;border-radius:10px;
      font-weight:bold;margin-right:8px;font-size:14px;
    }

    .section{
      background:var(--white);border-radius:16px;padding:18px;
      margin-bottom:18px;box-shadow:0 4px 12px rgba(0,0,0,.06);
    }

    .section h2{
      margin:0 0 14px;color:var(--blue-dark);font-size:20px;
    }

    .cards{
      display:grid;grid-template-columns:repeat(5,1fr);gap:14px;
    }

    .card{
      background:#f8fafc;border:1px solid var(--line);
      border-radius:14px;padding:16px;
    }

    .card h3{
      font-size:13px;color:var(--muted);margin-bottom:8px;
    }

    .card .value{
      font-size:28px;font-weight:bold;color:var(--blue-dark);
    }

    .grid{
      display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
    }

    .field{display:flex;flex-direction:column}

    .field label{
      font-size:12px;font-weight:bold;color:var(--muted);margin-bottom:6px;
    }

    .field input,.field select{
      padding:10px 12px;border:1px solid var(--line);
      border-radius:10px;font-size:14px;background:#fff;
    }

    .readonly{background:#f1f5f9 !important;font-weight:bold}

    .actions{
      margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;
    }

    button{
      border:none;padding:10px 14px;border-radius:10px;
      font-weight:bold;cursor:pointer;font-size:14px;
    }

    .btn-primary{background:var(--blue-main);color:#fff}
    .btn-secondary{background:#e5e7eb;color:#111827}
    .btn-danger{background:var(--danger);color:#fff}

    .table-wrap{overflow:auto}

    table{
      width:100%;min-width:3200px;border-collapse:collapse;
    }

    th,td{
      border:1px solid #334155;padding:8px 10px;
      font-size:13px;vertical-align:middle;
    }

    th{
      background:var(--head-bg);color:var(--head-text);text-align:center;
    }

    tbody tr:nth-child(even){background:#f8fafc}

    .center{text-align:center}
    .qty-book,.adjusted,.ending{
      background:var(--green-dark);color:#fff;font-weight:bold;text-align:center;
    }
    .in-col{background:var(--green-mid);text-align:center}
    .out-col{background:var(--green-light);text-align:center}

    .ok{color:#166534;font-weight:bold}
    .pr{color:var(--danger);font-weight:bold}

    .note{
      margin-top:10px;font-size:12px;color:var(--muted);line-height:1.5;
    }

    @media (max-width:1400px){
      .cards{grid-template-columns:repeat(2,1fr)}
      .grid{grid-template-columns:repeat(2,1fr)}
    }

    @media (max-width:700px){
      .cards,.grid{grid-template-columns:1fr}
      .title h1{font-size:22px}
    }
  </style>
</head>
<body>

      <h1>MASTER LIST</h1>
    </div>

    <div class="nav">
      <a href="./index.html">Home</a>

      <a href="./issuance.html">Issuance</a>
      <a href="./requisitions.html">Requisitions</a>

  </div>

  <div class="section">

  function getInventoryLevel(category, group) {
    if (category === "FAST-MOVING" && group === "ENGINEERING") return 6;

    if (category === "FAST-MOVING" && group === "HOUSEKEEPING") return 4;
    return 0;
  }

  function updateDashboard() {
    const items = masterItems.map(computeItem);

</html>
