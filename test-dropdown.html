<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown Test</title>
</head>
<body>

<h2>Dropdown Test</h2>

<label>Category</label>
<select id="category"></select>

<br><br>

<label>Classification</label>
<select id="classification"></select>

<br><br>

<label>Trade</label>
<select id="trade"></select>

<script>
const categoryMap = {
  "FAST-MOVING": ["HAZARDOUS"],
  "ON-NEED": ["SAFEKEEPING"],
  "TOOLS": ["TOOLS"],
  "GENERAL": [
    "EQUIPMENT",
    "PROJECT",
    "OFFICE SUPPLY",
    "UNIFORM",
    "OFFICE TOOLS",
    "GIVEAWAY",
    "PANTRY SUPPLY",
    "RAFFLE ITEMS",
    "MEDICINE",
    "OFFICE FURNITURES"
  ]
};

const tradeOptions = [
  "ENGINEERING",
  "ELECTRICAL",
  "CIVIL-WORK",
  "PLUMBING",
  "HVAC",
  "ELECTRO-MECH",
  "FDAS",
  "PLAN ATTENDANT",
  "BMS",
  "TREASURY",
  "TRD",
  "HOUSEKEEPING",
  "CPR",
  "IT DEPARTMENT",
  "PARKING",
  "PURCHASING",
  "SAFETY",
  "HUMAN RESOURCE",
  "OFFICE OF THE GENERAL MANAGER",
  "OFFICE OF THE ASSISTANT GENERAL MANAGER",
  "STOCK CONTROL"
];

function setOptions(selectId, options, placeholder) {
  const select = document.getElementById(selectId);
  select.innerHTML = `<option value="">${placeholder}</option>`;

  options.forEach(opt => {
    const option = document.createElement("option");
    option.value = opt.value;
    option.textContent = opt.label;
    select.appendChild(option);
  });
}

function loadCategory() {
  setOptions(
    "category",
    Object.keys(categoryMap).map(v => ({ value: v, label: v })),
    "Select Category"
  );
}

function loadClassification() {
  const category = document.getElementById("category").value;
  const list = categoryMap[category] || [];

  setOptions(
    "classification",
    list.map(v => ({ value: v, label: v })),
    "Select Classification"
  );
}

function loadTrade() {
  setOptions(
    "trade",
    tradeOptions.map(v => ({ value: v, label: v })),
    "Select Trade"
  );
}

document.getElementById("category").addEventListener("change", loadClassification);

loadCategory();
loadClassification();
loadTrade();
</script>

</body>
</html>
